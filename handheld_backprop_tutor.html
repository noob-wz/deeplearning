<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神经网络层间数据变换</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(160deg, #0a0a14 0%, #0f1029 50%, #0a0a14 100%);
  color: #e0e0e0;
  font-family: 'DM Sans', sans-serif;
  padding: 24px 16px;
}
.container { max-width: 520px; margin: 0 auto; }
h1 {
  font-size: 20px; font-weight: 700; text-align: center;
  letter-spacing: 1px; font-family: 'DM Mono', monospace;
  background: linear-gradient(135deg, #64b4ff, #a78bfa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 6px;
}
.subtitle { color: #666; font-size: 13px; text-align: center; margin-bottom: 20px; }

/* Network Diagram */
.network { display: flex; align-items: center; justify-content: center; gap: 0; padding: 16px 0; flex-wrap: wrap; }
.layer-box {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 10px 16px; border-radius: 10px; min-width: 70px; transition: all 0.3s;
  background: rgba(255,255,255,0.02); border: 1.5px solid rgba(255,255,255,0.05);
}
.layer-box.active { background: rgba(100,180,255,0.12); border-color: rgba(100,180,255,0.4); }
.layer-box .name { font-size: 11px; color: #666; font-weight: 600; transition: color 0.3s; }
.layer-box.active .name { color: #64b4ff; }
.layer-box .neurons { display: flex; gap: 5px; }
.neuron {
  width: 14px; height: 14px; border-radius: 50%;
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); transition: all 0.3s;
}
.layer-box.active .neuron { background: rgba(100,180,255,0.6); }
.layer-box .label { font-size: 11px; color: #777; font-family: 'DM Mono', monospace; }
.arrow { padding: 0 8px; color: #333; font-size: 18px; transition: color 0.3s; }
.arrow.active { color: #64b4ff; }

/* Buttons */
.buttons { display: flex; justify-content: center; gap: 6px; margin: 16px 0; flex-wrap: wrap; }
.btn {
  padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer;
  font-family: 'DM Sans', sans-serif; transition: all 0.2s; outline: none;
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); color: #888;
}
.btn:hover { background: rgba(255,255,255,0.06); }
.btn.active { background: rgba(100,180,255,0.12); border: 1.5px solid rgba(100,180,255,0.5); color: #64b4ff; }

/* Canvas */
.canvas-wrap { text-align: center; margin-bottom: 6px; }
.canvas-title { font-size: 15px; font-weight: 700; color: #e0e0e0; font-family: 'DM Mono', monospace; letter-spacing: 1px; }
.canvas-subtitle { font-size: 12px; color: #888; margin-top: 2px; }
canvas {
  border-radius: 12px; background: rgba(15,15,25,0.6);
  border: 1px solid rgba(255,255,255,0.06); display: block; margin: 0 auto; cursor: grab; max-width: 100%;
}
canvas:active { cursor: grabbing; }
.drag-hint { text-align: center; font-size: 11px; color: #555; margin-top: 4px; }

/* Info boxes */
.matrix-box {
  margin: 16px auto; padding: 10px 16px; max-width: 460px; text-align: center;
  background: rgba(167,139,250,0.06); border: 1px solid rgba(167,139,250,0.15);
  border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 13px; color: #a78bfa;
}
.desc-box {
  margin: 0 auto; padding: 14px 18px; max-width: 460px;
  background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px; font-size: 14px; line-height: 1.7; color: #bbb;
}
.legend {
  display: flex; justify-content: center; gap: 24px; margin: 16px 0; font-size: 12px; color: #888;
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
.insight-box {
  margin: 12px auto; padding: 14px 18px; max-width: 460px;
  background: rgba(100,180,255,0.04); border: 1px solid rgba(100,180,255,0.1);
  border-radius: 10px; font-size: 13px; line-height: 1.7; color: #8ab4d8;
}
.insight-title { font-weight: 700; margin-bottom: 4px; color: #64b4ff; }
</style>
</head>
<body>
<div class="container">
  <h1>神经网络层间数据变换</h1>
  <p class="subtitle">观察同一批样本在每一层坐标系中的位置如何变化</p>

  <div class="network" id="networkDiagram"></div>

  <div class="buttons" id="buttons"></div>

  <div class="canvas-wrap">
    <div class="canvas-title" id="canvasTitle"></div>
    <div class="canvas-subtitle" id="canvasSubtitle"></div>
  </div>
  <canvas id="mainCanvas" width="460" height="380"></canvas>
  <div class="drag-hint">拖拽旋转坐标系</div>

  <div class="matrix-box" id="matrixBox"></div>
  <div class="desc-box" id="descBox"></div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:rgba(255,107,107,0.8)"></div>类别 0（内圈）</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(100,180,255,0.8)"></div>类别 1（外圈）</div>
  </div>

  <div class="insight-box">
    <div class="insight-title">房间类比对应</div>
    <div id="insightText"></div>
  </div>
</div>

<script>
// === Data Generation ===
function generateData(n) {
  const points = [];
  for (let i = 0; i < n; i++) {
    const label = i < n / 2 ? 0 : 1;
    const r = label === 0 ? 0.3 + Math.random() * 0.4 : 1.0 + Math.random() * 0.5;
    const angle = Math.random() * Math.PI * 2;
    const x = r * Math.cos(angle) + (Math.random() - 0.5) * 0.15;
    const y = r * Math.sin(angle) + (Math.random() - 0.5) * 0.15;
    points.push({ x, y, label });
  }
  return points;
}

const relu = x => Math.max(0, x);
const sigmoid = x => 1 / (1 + Math.exp(-x));

// Pre-trained weights
const W1 = [[2.5, 0.8], [0.6, 2.8], [-1.8, 1.5]];
const b1 = [-1.2, -1.0, 0.3];
const W2 = [[1.8, -1.2, 2.0], [-1.5, 2.2, -0.8]];
const b2 = [-0.5, 0.3];
const W3 = [[2.5, -2.0]];
const b3 = [-0.3];

function forwardLayer(input, W, b, act) {
  return W.map((row, i) => {
    let s = b[i];
    for (let j = 0; j < row.length; j++) s += row[j] * input[j];
    return act(s);
  });
}

function transformAll(points) {
  return points.map(p => {
    const input = [p.x, p.y];
    const h1 = forwardLayer(input, W1, b1, relu);
    const h2 = forwardLayer(h1, W2, b2, relu);
    const out = forwardLayer(h2, W3, b3, sigmoid);
    return { input, h1, h2, out, label: p.label };
  });
}

const rawData = generateData(80);
const data = transformAll(rawData);

// === Layer Info ===
const layers = [
  {
    title: '输入层：原始特征空间', subtitle: '2个原始特征 → 2维坐标系',
    axes: ['x₁', 'x₂'], dims: 2,
    matrix: '每个样本是 [x₁, x₂]',
    desc: '红蓝两类样本在原始特征空间中形成同心圆——一根木棍（直线）无法将它们分开。这就是为什么需要深度学习。',
    insight: '这就是房间1的软木板——图钉钉死在原始特征坐标上，不会动。红蓝两类缠绕在一起，一根木棍（直线）无法分开。',
    netNeurons: [2, 3, 2, 1], netLabels: ['x₁,x₂', 'h₁,h₂,h₃', 'z₁,z₂', 'ŷ'],
    netNames: ['输入层', '隐藏层1', '隐藏层2', '输出层']
  },
  {
    title: '隐藏层1：第一次坐标改写', subtitle: '3个神经元 → 3维坐标系',
    axes: ['h₁', 'h₂', 'h₃'], dims: 3,
    matrix: 'W₁[3×2] · [x₁,x₂]ᵀ + b₁ → ReLU → [h₁,h₂,h₃]',
    desc: '3个神经元从不同角度"照射"原始数据，把2维的点变成3个标量再经过ReLU弯曲，拼成3维坐标。原来缠绕在一起的同心圆，在三维空间中被"拎"开了。',
    insight: '这就是房间2的软木板——大头针的位置由房间1的3个神经元决定。注意红蓝两类在三维空间中开始分离了——这就是"坐标改写"的力量。拖拽旋转看看！'
  },
  {
    title: '隐藏层2：第二次坐标改写', subtitle: '2个神经元 → 2维坐标系',
    axes: ['z₁', 'z₂'], dims: 2,
    matrix: 'W₂[2×3] · [h₁,h₂,h₃]ᵀ + b₂ → ReLU → [z₁,z₂]',
    desc: '2个神经元再次改写坐标，把3维降回2维。此时红蓝两类已经被推到了可以被一根木棍分开的位置——前面两个房间的"翻译"工作做完了。',
    insight: '这就是房间3之前的准备——大头针被进一步重新排列。红蓝两类已经几乎可以用一根木棍分开了。前面两个房间的"翻译"工作到此结束。'
  },
  {
    title: '输出层：最终预测', subtitle: '1个神经元 → 1维坐标',
    axes: ['ŷ'], dims: 1,
    matrix: 'W₃[1×2] · [z₁,z₂]ᵀ + b₃ → σ → ŷ',
    desc: '最后一层只有1个神经元，做的事和机器学习的逻辑回归一模一样——拿到整理好的特征，用sigmoid输出一个概率值。红色聚在0附近，蓝色聚在1附近。',
    insight: '最后一个房间。只剩一个维度——概率值。红色样本被推向0，蓝色被推向1。弹簧（Loss）就连接在这里。这和机器学习中的逻辑回归一模一样。'
  }
];

// === State ===
let activeLayer = 0;
let rotation = { x: -25, y: 35 };
let isDragging = false;
let lastPos = { x: 0, y: 0 };

// === UI Build ===
function buildNetwork() {
  const el = document.getElementById('networkDiagram');
  const names = ['输入层', '隐藏层1', '隐藏层2', '输出层'];
  const neurons = [2, 3, 2, 1];
  const labels = ['x₁,x₂', 'h₁,h₂,h₃', 'z₁,z₂', 'ŷ'];
  let html = '';
  for (let i = 0; i < 4; i++) {
    const cls = i === activeLayer ? 'layer-box active' : 'layer-box';
    let dots = '';
    for (let j = 0; j < neurons[i]; j++) dots += '<div class="neuron"></div>';
    html += `<div class="${cls}"><div class="name">${names[i]}</div><div class="neurons">${dots}</div><div class="label">${labels[i]}</div></div>`;
    if (i < 3) {
      const acls = (i === activeLayer || i + 1 === activeLayer) ? 'arrow active' : 'arrow';
      html += `<div class="${acls}">→</div>`;
    }
  }
  el.innerHTML = html;
}

function buildButtons() {
  const el = document.getElementById('buttons');
  const names = ['输入层', '隐藏层1', '隐藏层2', '输出层'];
  let html = '';
  for (let i = 0; i < 4; i++) {
    const cls = i === activeLayer ? 'btn active' : 'btn';
    html += `<button class="${cls}" onclick="setLayer(${i})">${names[i]}</button>`;
  }
  el.innerHTML = html;
}

function updateInfo() {
  const info = layers[activeLayer];
  document.getElementById('canvasTitle').textContent = info.title;
  document.getElementById('canvasSubtitle').textContent = info.subtitle;
  document.getElementById('matrixBox').textContent = info.matrix;
  document.getElementById('descBox').textContent = info.desc;
  document.getElementById('insightText').textContent = info.insight;
}

function setLayer(i) {
  activeLayer = i;
  buildNetwork();
  buildButtons();
  updateInfo();
  draw();
}

// === 3D Canvas ===
function getValues(d) {
  if (activeLayer === 0) return [d.input[0], d.input[1], 0];
  if (activeLayer === 1) return [d.h1[0], d.h1[1], d.h1[2] || 0];
  if (activeLayer === 2) return [d.h2[0], d.h2[1], 0];
  return [d.out[0], 0, 0];
}

function draw() {
  const canvas = document.getElementById('mainCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const info = layers[activeLayer];
  const radX = rotation.x * Math.PI / 180;
  const radY = rotation.y * Math.PI / 180;
  const cosX = Math.cos(radX), sinX = Math.sin(radX);
  const cosY = Math.cos(radY), sinY = Math.sin(radY);

  function project(x, y, z) {
    const x1 = x * cosY - z * sinY;
    const z1 = x * sinY + z * cosY;
    const y1 = y * cosX - z1 * sinX;
    const z2 = y * sinX + z1 * cosX;
    return { px: W / 2 + x1 * 120, py: H / 2 - y1 * 120, depth: z2 };
  }

  // Ranges
  const allVals = data.map(getValues);
  const ranges = [0, 1, 2].map(i => {
    const vals = allVals.map(v => v[i]);
    const min = Math.min(...vals), max = Math.max(...vals);
    return { min, max, range: (max - min) || 1 };
  });
  function normalize(vals) {
    return vals.map((v, i) => ((v - ranges[i].min) / ranges[i].range) * 3 - 1.5);
  }

  // Grid
  ctx.strokeStyle = 'rgba(120,120,140,0.15)';
  ctx.lineWidth = 0.5;
  for (let i = -1.5; i <= 1.5; i += 0.5) {
    let a = project(i, -1.5, 0), b = project(i, 1.5, 0);
    ctx.beginPath(); ctx.moveTo(a.px, a.py); ctx.lineTo(b.px, b.py); ctx.stroke();
    a = project(-1.5, i, 0); b = project(1.5, i, 0);
    ctx.beginPath(); ctx.moveTo(a.px, a.py); ctx.lineTo(b.px, b.py); ctx.stroke();
  }

  // Axes
  const axColors = ['#e74c3c', '#2ecc71', '#3498db'];
  const axEnds = [[1.8, 0, 0], [0, 1.8, 0], [0, 0, 1.8]];
  for (let i = 0; i < info.dims; i++) {
    const o = project(0, 0, 0), e = project(...axEnds[i]);
    ctx.strokeStyle = axColors[i]; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(o.px, o.py); ctx.lineTo(e.px, e.py); ctx.stroke();
    ctx.fillStyle = axColors[i];
    ctx.font = "bold 13px 'DM Mono', monospace";
    ctx.fillText(info.axes[i] || '', e.px + 5, e.py - 5);
  }

  // Points
  let projected = data.map((d, idx) => {
    const vals = normalize(getValues(d));
    const p = project(vals[0], vals[1], info.dims >= 3 ? vals[2] : 0);
    return { ...p, label: d.label };
  });
  projected.sort((a, b) => a.depth - b.depth);

  projected.forEach(p => {
    const alpha = 0.5 + 0.4 * ((p.depth + 2) / 4);
    const r = 5 + 2 * ((p.depth + 2) / 4);
    ctx.beginPath();
    ctx.arc(p.px, p.py, r, 0, Math.PI * 2);
    if (p.label === 0) {
      ctx.fillStyle = `rgba(255,107,107,${alpha})`;
      ctx.strokeStyle = `rgba(200,60,60,${alpha})`;
    } else {
      ctx.fillStyle = `rgba(100,180,255,${alpha})`;
      ctx.strokeStyle = `rgba(40,120,200,${alpha})`;
    }
    ctx.lineWidth = 1.5;
    ctx.fill(); ctx.stroke();
  });
}

// === Mouse / Touch ===
const canvas = document.getElementById('mainCanvas');

canvas.addEventListener('mousedown', e => {
  isDragging = true;
  lastPos = { x: e.clientX, y: e.clientY };
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  rotation.x = Math.max(-89, Math.min(89, rotation.x + (e.clientY - lastPos.y) * 0.5));
  rotation.y += (e.clientX - lastPos.x) * 0.5;
  lastPos = { x: e.clientX, y: e.clientY };
  draw();
});
window.addEventListener('mouseup', () => isDragging = false);

canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true;
    lastPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
}, { passive: true });
window.addEventListener('touchmove', e => {
  if (!isDragging || e.touches.length !== 1) return;
  rotation.x = Math.max(-89, Math.min(89, rotation.x + (e.touches[0].clientY - lastPos.y) * 0.5));
  rotation.y += (e.touches[0].clientX - lastPos.x) * 0.5;
  lastPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  draw();
}, { passive: true });
window.addEventListener('touchend', () => isDragging = false);

// === Init ===
buildNetwork();
buildButtons();
updateInfo();
draw();
</script>
</body>
</html>
