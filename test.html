<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>动量(Momentum)下降动态演示</title>
  <style>
    body { text-align: center; font-family: sans-serif; background-color: #f4f4f9; }
    canvas { background-color: #ffffff; border: 1px solid #ccc; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-top: 20px; }
    .controls { margin-top: 20px; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; }
    button:hover { background-color: #0056b3; }
    .legend { margin-top: 15px; font-size: 16px; }
    .red { color: #ff4d4d; font-weight: bold; }
    .blue { color: #007bff; font-weight: bold; }
  </style>
</head>
<body>
<h2>"大峡谷"地形中的寻优之旅</h2>
<div class="legend">
  <span class="red">🔴 红球：普通梯度下降 (无惯性)</span> |
  <span class="blue">🔵 蓝球：带动量的梯度下降 (保留 90% 惯性)</span>
</div>

<canvas id="myCanvas" width="600" height="600"></canvas>

<div class="controls">
  <button onclick="startAnimation()">开始 / 重置比赛</button>
</div>

<script>
  const canvas = document.getElementById('myCanvas');
  const ctx = canvas.getContext('2d');
  let animationId;

  // 视图映射：把数学坐标(-10到10)映射到屏幕(0到600)
  function toScreen(x, y) {
      return { cx: x * 30 + 300, cy: y * 30 + 300 };
  }

  // 画背景等高线（模拟一个东西向平缓，南北向陡峭的峡谷）
  function drawContour() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = '#e0e0e0';
      for(let r = 1; r < 15; r++) {
          ctx.beginPath();
          ctx.ellipse(300, 300, r * 40, r * 15, 0, 0, 2 * Math.PI);
          ctx.stroke();
      }
      // 画个终点星号
      ctx.fillStyle = 'green';
      ctx.fillText("⭐ 终点 (最优解)", 280, 305);
  }

  // 物理参数设置
  const eta = 0.06;     // 学习率 (蹬踏板的力气)
  const gamma = 0.9;    // 动量参数 (保留90%的历史速度)

  // 初始状态
  let state = {};

  function init() {
      state = {
          // 红球 (普通GD)
          x_std: -8, y_std: 8,

          // 蓝球 (Momentum)
          x_mom: -8, y_mom: 8,
          vx_mom: 0, vy_mom: 0  // 初始速度为0
      };
      drawContour();
  }

  function step() {
      // 目标函数 J = 0.1*x^2 + 2*y^2 (东西平缓，南北极其陡峭)
      // 偏导数 (真实坡度)：dx = 0.2*x, dy = 4*y

      // --- 🔴 红球的更新逻辑 (没有速度，直接拿坡度更新) ---
      let dx_std = 0.2 * state.x_std;
      let dy_std = 4 * state.y_std;
      state.x_std = state.x_std - eta * dx_std;
      state.y_std = state.y_std - eta * dy_std;

      // --- 🔵 蓝球的更新逻辑 (就是你问的那两个公式！) ---
      let dx_mom = 0.2 * state.x_mom;
      let dy_mom = 4 * state.y_mom;

      // 公式 1: 计算现在的速度 vt = gamma * v_{t-1} + eta * 坡度
      state.vx_mom = gamma * state.vx_mom + eta * dx_mom;
      state.vy_mom = gamma * state.vy_mom + eta * dy_mom;

      // 公式 2: 更新位置 theta_t = theta_{t-1} - vt
      state.x_mom = state.x_mom - state.vx_mom;
      state.y_mom = state.y_mom - state.vy_mom;

      // 画轨迹
      let pos_std = toScreen(state.x_std, state.y_std);
      ctx.fillStyle = 'rgba(255, 77, 77, 0.8)';
      ctx.beginPath(); ctx.arc(pos_std.cx, pos_std.cy, 4, 0, Math.PI*2); ctx.fill();

      let pos_mom = toScreen(state.x_mom, state.y_mom);
      ctx.fillStyle = 'rgba(0, 123, 255, 0.8)';
      ctx.beginPath(); ctx.arc(pos_mom.cx, pos_mom.cy, 4, 0, Math.PI*2); ctx.fill();

      // 如果没到终点，继续动画
      if (Math.abs(state.x_std) > 0.1 || Math.abs(state.x_mom) > 0.1) {
          animationId = requestAnimationFrame(step);
      }
  }

  function startAnimation() {
      cancelAnimationFrame(animationId);
      init();
      step();
  }

  // 页面加载画个初始状态
  init();
</script>
</body>
</html>
